name: AI Test Case Generator

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: read
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest

    # run only when label exists
    

    steps:
      - name: Generate Test Cases
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body || "";

            function extract(text, start, end=null) {
              const s = text.indexOf(start);
              if (s === -1) return "";
              const from = s + start.length;
              if (!end) return text.substring(from).trim();
              const e = text.indexOf(end, from);
              return text.substring(from, e).trim();
            }

            const scenario = extract(issueBody, "### Scenario", "### Output Format");
            const format = extract(issueBody, "### Output Format").toLowerCase();

            let result = "";

            if (format.includes("bdd")) {
              result = `### ✅ BDD Test Cases

Given ${scenario}
When the user performs the action
Then the expected result should occur`;
            }
            else if (format.includes("checklist")) {
              result = `### ✅ QA Checklist

- [ ] Verify main workflow
- [ ] Validate negative scenarios
- [ ] Test edge cases
- [ ] Verify error handling`;
            }
            else {
              result = `### ✅ Structured Test Cases

| TC ID | Description | Steps | Expected Result |
|------|------------|------|----------------|
| TC-01 | Verify scenario | Execute scenario | Expected behavior |
| TC-02 | Invalid input handling | Enter wrong data | Error shown |
| TC-03 | Boundary validation | Leave fields empty | Validation message |

**Scenario:** ${scenario}`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: result
            });
